name: rclonerem
help: Gestiona servicios rclone para OneDrive y Google Drive
version: 1.0.0

commands:
- name: onedrive
  alias: od
  help: Gestiona el servicio de OneDrive (rc-OneDriveP)
  examples:
  - rclonerem onedrive
  - rclonerem od

- name: gdrive
  alias: gd
  help: Gestiona el servicio de Google Drive (rc-GoogleDriveP)
  examples:
  - rclonerem gdrive
  - rclonerem gd
